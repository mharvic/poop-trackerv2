<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Dashboard</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/styles.css">

  <script src="/scripts/auth-check.js"></script>
  <script src="/scripts/logout.js" defer></script>
  <script src="/scripts/dashboard.js" defer></script>
</head>
<body>

  <div class="container">

    <h1>Welcome, <span id="welcomeName">User</span></h1>

    <div class="profile">
      <h3>Your Profile</h3>
      <p>Name: <span id="displayName"></span></p>
      <p>Email: <span id="displayEmail"></span></p>
      <p>Bio: <span id="displayBio"></span></p>
    </div>

    <h3>Update Profile</h3>

    <form id="profileForm">
      <input type="text" id="updateName" placeholder="Name" required />
      <input type="email" id="updateEmail" placeholder="Email" required />
      <textarea id="updateBio" placeholder="Bio"></textarea>

      <button type="submit">Save Profile</button>
    </form>

    <button id="logoutBtn">Logout</button>

  </div>

</body>
</html>
