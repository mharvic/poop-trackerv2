<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>User Dashboard</title>

  <script src="/scripts/auth-check.js"></script>
  <script src="/scripts/logout.js" defer></script>
  <script src="/scripts/dashboard.js" defer></script>
</head>
<body>

  <h1>Welcome, <span id="welcomeName">User</span>!</h1>

  <hr>

  <!-- ✅ PROFILE DISPLAY (IMPORTANT FOR MARKS) -->
  <h2>Your Profile</h2>
  <p>Name: <span id="displayName"></span></p>
  <p>Email: <span id="displayEmail"></span></p>
  <p>Bio: <span id="displayBio"></span></p>

  <hr>

  <!-- ✅ UPDATE FORM -->
  <h2>Update Profile</h2>

  <form id="profileForm">
    <label>Name:</label>
    <input type="text" id="updateName" required />
    <br><br>

    <label>Email:</label>
    <input type="email" id="updateEmail" required />
    <br><br>

    <label>Bio:</label><br>
    <textarea id="updateBio" maxlength="500"></textarea>
    <br><br>

    <button type="submit">Save Profile</button>
  </form>

  <br>

  <button id="logoutBtn" style="background:red;color:white;">Logout</button>

</body>
</html>
