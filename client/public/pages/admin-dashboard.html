<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Dashboard</title>

  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/styles.css">
</head>

<body>

  <div class="admin-wrapper">

    <header class="admin-header">
      <div>
        <h1>Admin Dashboard</h1>
        <p class="subtitle">VIP access only</p>

        <p class="admin-subtext">
          You are logged in as <strong><span id="welcomeName">Admin</span></strong>.
          This area is restricted to authorized administrators only.
        </p>
      </div>

      <button id="logoutBtn">Logout</button>
    </header>

    <div class="admin-content">

      <div class="card">
        <h3>System Access</h3>
        <p>You are logged in as an administrator.</p>
        <p>Only users with the correct role can view this page.</p>
      </div>

      <div class="card">
        <h3>Profile Information</h3>

        <p><strong>Name:</strong> <span id="displayName"></span></p>
        <p><strong>Email:</strong> <span id="displayEmail"></span></p>
        <p><strong>Role:</strong> <span id="displayRole"></span></p>
      </div>

      <div class="card">
        <h3>Edit Profile</h3>

        <form id="profileForm">
          <label>Name</label>
          <input type="text" id="updateName" required />

          <label>Email</label>
          <input type="email" id="updateEmail" required />

          <button type="submit">Save Changes</button>
        </form>
      </div>

    </div>

  </div>

  <script src="/scripts/auth-check.js"></script>
  <script src="/scripts/logout.js"></script>
  <script src="/scripts/admin-dashboard.js"></script>

</body>
</html>
