<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Dashboard</title>
  <script src="/scripts/auth-check.js"></script>
  <script src="/scripts/logout.js" defer></script>
  
</head>
<body>
  <main>
    <h1>Welcome, <span id="welcomeName">User</span>!</h1>
  
    <hr>

    <h2>Update Profile</h2>
    <form id="profileForm">
      <label for="updateName">Name:</label>
      <input type="text" id="updateName" name="updateName" disabled />
      <br><br>
      
      <label for="updateEmail">Email:</label>
      <input type="email" id="updateEmail" name="updateEmail" disabled />
      <br><br>

      <button type="submit" disabled>Update Profile (Coming Soon)</button>
    </form>

    <hr>

    <button id="logoutBtn" style="margin-top: 20px; background-color: red; color: white;">Logout</button>
  </main>
  
</body>
</html>
